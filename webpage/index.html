<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H Water - Stay Hydrated on Android & Windows</title>
    <style>
         :root {
            --primary: #0070F3;
            --accent: #79FFE1;
            --dark: #0F172A;
            --light: #F0F7FF;
            --text: #334155;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        
        body {
            color: var(--dark);
            background: #ffffff;
            line-height: 1.5;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            width: 100%;
        }
        /* Navbar / Logo Area */
        
        nav {
            padding: 25px 0 10px 0;
            background: var(--light);
        }
        
        .nav-container {
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }
        
        .logo-img {
            height: 45px;
            width: auto;
            object-fit: contain;
            display: block;
        }
        /* Hero Section */
        
        header {
            padding: 50px 0 80px 0;
            background: linear-gradient(180deg, var(--light) 0%, #ffffff 100%);
            flex: 1;
            display: flex;
            align-items: center;
        }
        
        .hero {
            display: flex;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        
        .hero-text {
            flex: 1.2;
            min-width: 320px;
        }
        
        .hero-text h1 {
            font-size: 3.5rem;
            line-height: 1.1;
            margin-bottom: 20px;
            color: var(--dark);
            font-weight: 800;
        }
        
        .hero-text h1 span {
            color: var(--primary);
        }
        
        .hero-text p {
            font-size: 1.3rem;
            color: var(--text);
            margin-bottom: 35px;
            font-weight: 500;
        }
        /* Funky CTA Buttons */
        
        .cta-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 28px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 14px rgba(0, 112, 243, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 112, 243, 0.4);
        }
        
        .btn-secondary {
            background: var(--dark);
            color: white;
            box-shadow: 0 4px 14px rgba(15, 23, 42, 0.2);
        }
        
        .btn-secondary:hover {
            box-shadow: 0 6px 20px rgba(15, 23, 42, 0.3);
        }
        /* Dual Mockups Showcase */
        
        .hero-mockups {
            flex: 1;
            min-width: 320px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 20px;
            position: relative;
        }
        
        .mockup-phone {
            width: 180px;
            height: 360px;
            border-radius: 24px;
            border: 6px solid var(--dark);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            z-index: 2;
            transform: rotate(-3deg);
            object-fit: cover;
            background: #fff;
        }
        
        .mockup-desktop {
            width: 320px;
            height: 200px;
            border-radius: 12px;
            border: 6px solid var(--dark);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            z-index: 1;
            transform: rotate(2deg);
            object-fit: cover;
            background: #fff;
        }
        /* Footer */
        
        footer {
            background: var(--dark);
            color: #ffffff;
            padding: 30px 0;
            text-align: center;
            font-size: 1rem;
        }
        
        footer p {
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        
        footer span {
            color: var(--accent);
            font-weight: bold;
        }
    </style>
</head>

<body>

    <!-- Navigation / Logo Bar -->
    <nav>
        <div class="container nav-container">
            <img src="logo.png" alt="H Water Logo" class="logo-img">
        </div>
    </nav>

    <!-- Hero Section -->
    <header>
        <div class="container hero">
            <div class="hero-text">
                <h1>Your brain forgets. <br><span>H Water</span> won't.</h1>
                <p>The aggressively simple hydration system that locks onto your phone and desktop to ensure you never run on empty again.</p>
                <div class="cta-buttons">
                    <a href="#" class="btn">🤖 Get on Android</a>
                    <a href="#" class="btn btn-secondary">🪟 Install on Windows</a>
                </div>
            </div>

            <!-- Dual Showcase Block -->
            <div class="hero-mockups">
                <img src="mobile.png" alt="H Water Mobile Interface" class="mockup-phone">
                <img src="windows.png" alt="H Water Windows Interface" class="mockup-desktop">
            </div>
        </div>
    </header>

    <!-- Clean Footer -->
    <footer>
        <div class="container">
            <p>Made with 💧 by <span>Haris Jahangir</span></p>
        </div>
    </footer>

</body>

</html>
