<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H Water - Stay Hydrated on Android & Windows</title>
    <style>
         :root {
            --primary: #0070F3;
            --dark: #1E293B;
            --light: #ffffff;
            --bg-light: #F0F7FF;
            --text-gray: #475569;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        
        body {
            color: var(--dark);
            background: linear-gradient(180deg, var(--bg-light) 0%, var(--light) 100%);
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100vw;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            width: 100%;
        }
        
        /* Navbar Area */
        nav {
            padding: 20px 0 10px 0;
            background: transparent;
        }
        
        .nav-container {
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }
        
        .logo-img {
            height: 45px;
            width: auto;
            object-fit: contain;
            display: block;
        }
        
        /* Hero Section Base */
        header {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }
        
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
            width: 100%;
        }
        
        /* Text Container */
        .hero-text {
            flex: 1.2;
        }
        
        .hero-text h1 {
            font-size: 3.5rem;
            line-height: 1.1;
            margin-bottom: 20px;
            color: var(--dark);
            font-weight: 800;
        }
        
        .hero-text h1 span {
            color: var(--primary);
        }
        
        .hero-text p {
            font-size: 1.25rem;
            color: var(--text-gray);
            margin-bottom: 35px;
            font-weight: 500;
            max-width: 540px;
        }
        
        /* Platform Buttons */
        .cta-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 32px;
            background: var(--primary);
            color: var(--light);
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 14px rgba(0, 112, 243, 0.25);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 112, 243, 0.35);
        }
        
        .btn-secondary {
            background: var(--dark);
            color: var(--light);
            box-shadow: 0 4px 14px rgba(30, 41, 59, 0.15);
        }
        
        .btn-secondary:hover {
            background: #0f172a;
        }
        
        /* Device Mockups Showcase Layout Area */
        .hero-mockups {
            flex: 0.9;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 24px;
            position: relative;
        }
        
        .mockup-phone {
            width: 175px;
            height: 350px;
            border-radius: 24px;
            border: 6px solid var(--dark);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            transform: rotate(-3deg);
            object-fit: cover;
            background: #fff;
            flex-shrink: 0;
        }
        
        .mockup-desktop {
            width: 310px;
            height: 195px;
            border-radius: 12px;
            border: 6px solid var(--dark);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            transform: rotate(2deg);
            object-fit: cover;
            background: #fff;
            flex-shrink: 0;
        }
        
        /* Structural Footer */
        footer {
            background: transparent;
            color: var(--text-gray);
            padding: 25px 0;
            text-align: center;
            font-size: 0.95rem;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            margin-top: auto;
        }
        
        footer p {
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        
        footer span {
            color: var(--primary);
            font-weight: bold;
        }

        /* Responsive Media Queries */
        @media (max-width: 992px) {
            body {
                overflow-y: auto; /* Restores vertical scroll for smaller viewports */
            }

            .hero {
                flex-direction: column;
                text-align: center;
                gap: 50px;
            }

            .hero-text {
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .hero-text h1 {
                font-size: 2.8rem;
            }

            .hero-text p {
                font-size: 1.1rem;
                margin-bottom: 25px;
            }

            .cta-buttons {
                justify-content: center;
            }

            .hero-mockups {
                width: 100%;
                align-items: center;
                margin-top: 20px;
            }
        }

        @media (max-width: 576px) {
            .hero-text h1 {
                font-size: 2.2rem;
            }

            .cta-buttons {
                flex-direction: column;
                width: 100%;
                padding: 0 20px;
            }

            .btn {
                width: 100%;
            }

            /* Scales down mockups to fit comfortably on narrow screens */
            .hero-mockups {
                gap: 12px;
            }

            .mockup-phone {
                width: 120px;
                height: 240px;
                border-width: 4px;
                border-radius: 16px;
            }

            .mockup-desktop {
                width: 200px;
                height: 126px;
                border-width: 4px;
                border-radius: 8px;
            }
        }
    </style>
</head>

<body>

    <!-- Navigation Header Area -->
    <nav>
        <div class="container nav-container">
            <img src="logo.png" alt="H Water Logo" class="logo-img">
        </div>
    </nav>

    <!-- App Overview Showcase Workspace Layout -->
    <header>
        <div class="container hero">
            <div class="hero-text">
                <h1>Forget to hydrate?<br><span>H Water</span> doesn't!</h1>
                <p>The aggressively simple hydration system that locks onto your phone and desktop to ensure you never run on empty again.</p>
                <div class="cta-buttons">
                    <a href="https://www.mediafire.com/file/ncf0cr7v3smrthp/h_water_arm64.apk/file" class="btn" target="_blank">Get on Android</a>
                    <a href="http://www.mediafire.com/file/jkgz8pt0xhcdn7v/h_water_windows.zip" class="btn btn-secondary" target="_blank">Install on Windows</a>
                </div>
            </div>

            <div class="hero-mockups">
                <img src="MOBILE.png" alt="H Water Mobile Interface" class="mockup-phone">
                <img src="WINDOWS.png" alt="H Water Windows Interface" class="mockup-desktop">
            </div>
        </div>
    </header>

    <!-- Core Structural Footer Element Block -->
    <footer>
        <div class="container">
            <p>Made by <span>Haris Jahangir</span></p>
        </div>
    </footer>

</body>

</html>
