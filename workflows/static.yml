name: Deploy Webpage Subfolder to Pages

on:
  push:
    branches: ["master"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      # CRITICAL FIX: The path property maps explicitly to your webpage subfolder location
      - name: Upload Static Webpage Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './webpage'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
